<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background: warm lavender center radiating to soft periwinkle-blue -->
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%"   stop-color="#ede4f8"/>
      <stop offset="50%"  stop-color="#d6e8f8"/>
      <stop offset="100%" stop-color="#b8ccee"/>
    </radialGradient>

    <!-- Moon fill: creamy white center to soft warm yellow -->
    <radialGradient id="moonFill" cx="38%" cy="32%" r="66%">
      <stop offset="0%"   stop-color="#fefce8"/>
      <stop offset="65%"  stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fde047"/>
    </radialGradient>

    <!-- Halo behind moon -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fef9c3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft blur for the glow disc -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Subtle cloud wisps at lower edges for softness -->
  <ellipse cx="100"  cy="530" rx="200" ry="65" fill="#ffffff" opacity="0.09"/>
  <ellipse cx="700"  cy="545" rx="210" ry="68" fill="#ffffff" opacity="0.08"/>
  <ellipse cx="400"  cy="578" rx="300" ry="52" fill="#ffffff" opacity="0.07"/>

  <!-- ── Background stars (behind moon) ── -->
  <!-- Canonical 5-pt star polygon at origin, R=10, r=4:
       0,-10  2.35,-3.24  9.51,-3.09  3.80,1.24  5.88,8.09
       0,4   -5.88,8.09  -3.80,1.24  -9.51,-3.09  -2.35,-3.24 -->

  <!-- Top-left accent star (scale 1.3) -->
  <g transform="translate(132,108) scale(1.3)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#fde68a" opacity="0.82"/>
  </g>

  <!-- Top-right star (scale 1.0) -->
  <g transform="translate(658,86)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#fde68a" opacity="0.70"/>
  </g>

  <!-- Left mid star, lavender (scale 0.8) -->
  <g transform="translate(80,244) scale(0.8)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#c4b5fd" opacity="0.68"/>
  </g>

  <!-- Right mid star (scale 0.95) -->
  <g transform="translate(714,308) scale(0.95)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#fde68a" opacity="0.62"/>
  </g>

  <!-- Bottom-left star (scale 0.75) -->
  <g transform="translate(196,470) scale(0.75)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#fde68a" opacity="0.55"/>
  </g>

  <!-- Bottom-right star, lavender (scale 0.72) -->
  <g transform="translate(620,463) scale(0.72)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#c4b5fd" opacity="0.58"/>
  </g>

  <!-- Tiny accent stars -->
  <g transform="translate(308,76) scale(0.55)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#fde68a" opacity="0.48"/>
  </g>
  <g transform="translate(490,98) scale(0.50)">
    <polygon points="0,-10 2.35,-3.24 9.51,-3.09 3.80,1.24 5.88,8.09 0,4 -5.88,8.09 -3.80,1.24 -9.51,-3.09 -2.35,-3.24"
             fill="#c4b5fd" opacity="0.52"/>
  </g>

  <!-- Dot sparkles scattered around -->
  <circle cx="205" cy="148" r="3.2" fill="#fde68a" opacity="0.68"/>
  <circle cx="596" cy="128" r="2.6" fill="#fde68a" opacity="0.62"/>
  <circle cx="742" cy="194" r="2.2" fill="#c4b5fd" opacity="0.65"/>
  <circle cx="58"  cy="398" r="2.8" fill="#fde68a" opacity="0.52"/>
  <circle cx="752" cy="437" r="3.0" fill="#fde68a" opacity="0.48"/>
  <circle cx="163" cy="346" r="1.8" fill="#c4b5fd" opacity="0.58"/>
  <circle cx="738" cy="106" r="2.0" fill="#fde68a" opacity="0.54"/>
  <circle cx="52"  cy="158" r="2.4" fill="#c4b5fd" opacity="0.50"/>
  <circle cx="348" cy="500" r="2.2" fill="#fde68a" opacity="0.44"/>
  <circle cx="460" cy="508" r="1.8" fill="#c4b5fd" opacity="0.42"/>

  <!-- ── Moon halo ── -->
  <circle cx="400" cy="258" r="180" fill="url(#haloGrad)"/>
  <!-- Blurred warm glow disc behind moon -->
  <circle cx="400" cy="258" r="132" fill="#fef3c7" opacity="0.38" filter="url(#glow)"/>

  <!-- ── Sleep hat (drawn before moon so moon's circle naturally overlaps the base) ── -->
  <polygon points="358,200 452,174 428,52" fill="#c4b5fd"/>
  <!-- Hat highlight (lighter stripe along left edge) -->
  <line x1="384" y1="190" x2="432" y2="72"
        stroke="#ede9fe" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <!-- Hat band at the base -->
  <polygon points="358,200 452,174 447,186 362,212" fill="#a78bfa" opacity="0.45"/>
  <!-- Pompom: three layered circles for fluffy look -->
  <circle cx="428" cy="44" r="20" fill="#ddd6fe"/>
  <circle cx="428" cy="44" r="13" fill="#ede9fe"/>
  <circle cx="425" cy="41" r="6"  fill="#ffffff" opacity="0.75"/>

  <!-- ── Moon body ── -->
  <circle cx="400" cy="258" r="116" fill="url(#moonFill)"/>
  <!-- Very subtle rim for a little depth -->
  <circle cx="400" cy="258" r="116" fill="none" stroke="#fde68a" stroke-width="2.5" opacity="0.45"/>

  <!-- ── Moon face ── -->

  <!-- Closed eyes: downward arcs (∪) = classic sleepy/happy closed eyes -->
  <!-- Left eye -->
  <path d="M 352 244 Q 371 264 390 244"
        stroke="#b07a26" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Left eye lashes (3 tiny lines dropping from the arc) -->
  <line x1="362" y1="258" x2="359" y2="267" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="371" y1="264" x2="371" y2="274" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="380" y1="260" x2="382" y2="269" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Right eye -->
  <path d="M 410 244 Q 429 264 448 244"
        stroke="#b07a26" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Right eye lashes -->
  <line x1="420" y1="258" x2="418" y2="267" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="429" y1="264" x2="429" y2="274" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="438" y1="260" x2="440" y2="269" stroke="#b07a26" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Gentle smile -->
  <path d="M 372 292 Q 400 318 428 292"
        stroke="#b07a26" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="344" cy="276" rx="26" ry="15" fill="#fca5a5" opacity="0.40"/>
  <ellipse cx="456" cy="276" rx="26" ry="15" fill="#fca5a5" opacity="0.40"/>

  <!-- ── Floating Z's (italic, drifting upper-right) ── -->
  <text x="542" y="210"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="bold" font-style="italic"
        fill="#a78bfa" opacity="0.80">z</text>
  <text x="580" y="175"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="bold" font-style="italic"
        fill="#a78bfa" opacity="0.62">z</text>
  <text x="607" y="148"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19" font-weight="bold" font-style="italic"
        fill="#a78bfa" opacity="0.44">z</text>

  <!-- ── Text label ── -->
  <!-- Frosted pill backdrop -->
  <rect x="126" y="430" width="548" height="72" rx="36" fill="#ffffff" opacity="0.28"/>

  <!-- Label -->
  <text
    x="400" y="475"
    text-anchor="middle"
    font-family="'Trebuchet MS', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27"
    font-weight="600"
    fill="#4e3d82"
    letter-spacing="0.5"
  >This illustration is resting... ✨</text>
</svg>
